name: CI — Lint & Build

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # BACKEND: Type-check + build
  # ─────────────────────────────────────────────
  backend:
    name: Backend — Type-check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit --skipLibCheck

      - name: Build (compile to dist/)
        run: npm run build

  # ─────────────────────────────────────────────
  # FRONTEND: Lint + Type-check + Build
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend — Lint, Type-check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    env:
      # Provide dummy values so env-dependent code doesn't crash at build time
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5050
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: dummy_client_id_for_ci
      GEMINI_API_KEY: dummy_gemini_key_for_ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint -- --max-warnings 0
        continue-on-error: true   # Warn but don't fail if existing lint issues exist

      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit --skipLibCheck

      - name: Build (Next.js production)
        run: npm run build
        env:
          # Skip Next.js built-in TS type checking — we already ran tsc above
          NEXT_TYPESCRIPT_TSCONFIGPATH: tsconfig.json
